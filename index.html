<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon"  href="/favicon/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon/favicon.ico" />
    <link rel="icon" type="image/png" sizes="96x96"  href="/favicon/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="32x32"  href="/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16"  href="/favicon/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/favicon/apple-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/favicon/apple-icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/favicon/apple-icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="/favicon/apple-icon-114x114.png" />
    <link rel="apple-touch-icon"                 href="/favicon/apple-icon.png" />
    <link rel="manifest" href="/favicon/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect to Google Fonts CDN (non-blocking DNS warmup) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Admin UI Font (Public Sans) — deferred, non-render-blocking -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap">
    </noscript>

    <title>Prometrica Academy — Admin Portal</title>

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://prometricaacademy.cloud/" />
    <meta property="og:title"       content="Prometrica Academy — Admin Portal" />
    <meta property="og:description" content="لوحة تحكم إدارة منصة Prometrica Academy التعليمية للصيادلة" />
    <meta property="og:image"       content="https://prometricaacademy.cloud/logo.png" />
    <meta property="og:site_name"   content="Prometrica Academy" />
    <meta property="og:locale"      content="ar_SA" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Prometrica Academy — Admin Portal" />
    <meta name="twitter:description" content="لوحة تحكم إدارة منصة Prometrica Academy التعليمية للصيادلة" />
    <meta name="twitter:image"       content="https://prometricaacademy.cloud/logo.png" />

    <!-- SEO -->
    <meta name="description" content="لوحة تحكم إدارة منصة Prometrica Academy التعليمية للصيادلة" />
    <meta name="robots"      content="noindex, nofollow" />

    <!-- Loader Styles — inlined to eliminate render-blocking external request -->
    <style>
      body { margin: 0; }
      html { overflow-x: hidden; overflow-y: scroll; }
      #loading-bg {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--initial-loader-bg, #fff);
        width: 100vw;
        height: 100vh;
        gap: 1rem 0;
      }
      .loading-logo img { max-width: 250px; height: auto; }
      .loading {
        position: relative;
        box-sizing: border-box;
        border: 3px solid transparent;
        border-radius: 50%;
        block-size: 55px;
        inline-size: 55px;
      }
      .loading .effect-1,
      .loading .effect-2,
      .loading .effect-3 {
        position: absolute;
        box-sizing: border-box;
        border: 3px solid transparent;
        border-radius: 50%;
        block-size: 100%;
        border-inline-start: 3px solid var(--initial-loader-color, #eee);
        inline-size: 100%;
      }
      .loading .effect-1 { animation: rotate 1s ease infinite; }
      .loading .effect-2 { animation: rotate-opacity 1s ease infinite 0.1s; }
      .loading .effect-3 { animation: rotate-opacity 1s ease infinite 0.2s; }
      .loading .effects { transition: all 0.3s ease; }
      @keyframes rotate {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(1turn); }
      }
      @keyframes rotate-opacity {
        0%   { opacity: 0.1; transform: rotate(0deg); }
        100% { opacity: 1;   transform: rotate(1turn); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loading-bg">
        <div class="loading-logo">
          <img src="/logo.png" alt="Logo" />
        </div>
        <div class="loading">
          <div class="effect-1 effects"></div>
          <div class="effect-2 effects"></div>
          <div class="effect-3 effects"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/resources/ts/main.ts"></script>
  </body>
</html>
